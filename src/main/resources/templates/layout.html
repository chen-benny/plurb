<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — plurb'">plurb</title>
    <link rel="stylesheet" th:href="@{/static/css/main.css}">
    <script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>
    <th:block th:if="${post != null}">
        <meta property="og:title" th:content="${post.title}">
        <meta property="og:type" content="article">
        <meta property="og:description" th:if="${post.description != null and !post.description.isEmpty()}" th:content="${post.description}">
        <meta property="og:image" th:if="${post.coverImageUrl != null and !post.coverImageUrl.isEmpty()}" th:content="${post.coverImageUrl}">
        <meta property="og:url" th:if="${canonicalUrl != null}" th:content="${canonicalUrl}">
    </th:block>
    <link rel="alternate" type="application/rss+xml"
          th:if="${rssUrl != null}"
          th:href="${rssUrl}"
          th:title="${author != null ? author.displayName + ' on Panorama' : 'Panorama'}">
</head>

<div th:fragment="scripts">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
</div>

<body>

<th:block th:fragment="nav(isPanorama)">
<nav>
    <div th:class="${isPanorama} ? 'nav-inner' : 'nav-inner nav-inner-wide'">
        <div class="nav-brand-group">
            <a class="nav-brand" th:href="${isPanorama} ? @{/panorama} : @{/}"
               th:text="${isPanorama} ? 'panorama' : 'plurb'">brand</a>
            <span class="nav-tagline"
                  th:text="${isPanorama} ? 'you are what you show.' : 'out of many, one.'"></span>
        </div>
        <div class="nav-links">
            <span sec:authorize="isAuthenticated()">
                <th:block th:if="${isPanorama}">
                    <a class="nav-btn" th:href="@{/panorama/editor}">dashboard</a>
                    <a class="nav-btn" th:href="@{/panorama/editor/account}">account</a>
                </th:block>
            </span>
            <span sec:authorize="isAnonymous()">
                <a class="nav-btn" th:href="@{/login}">login</a>
            </span>
            <th:block th:if="${isPanorama}">
                <a class="nav-btn nav-btn-back" th:href="@{/}">&#8592; plurb</a>
            </th:block>
            <th:block th:unless="${isPanorama}">
                <a class="nav-btn" th:href="@{/panorama}">panorama</a>
            </th:block>
            <button type="button" id="themeToggle" class="nav-btn nav-btn-theme" title="Toggle theme">◑</button>
        </div>
    </div>
</nav>
<script>
(function(){
    var btn = document.getElementById('themeToggle');
    if(!btn) return;
    btn.addEventListener('click', function(){
        var light = document.documentElement.classList.toggle('light');
        localStorage.setItem('theme', light ? 'light' : 'dark');
    });
})();
</script>
</th:block>

<footer th:fragment="footer">
    <div class="footer-inner">
        <div class="footer-left">
            <span class="footer-brand">plurb</span>
            <span class="footer-tagline">out of many, one.</span>
        </div>
        <div class="footer-center">
            <p>Made by <a href="https://github.com/chen-benny" target="_blank">Benny Chen</a></p>
            <p>
                Content licensed under
                <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">CC BY 4.0</a>
                · Source code under
                <a href="https://www.gnu.org/licenses/agpl-3.0.html" target="_blank">AGPL-3.0</a>
            </p>
        </div>
        <div class="footer-right">
            <a href="https://github.com/chen-benny/plurb" target="_blank">GitHub</a>
        </div>
    </div>
</footer>

</body>
</html>
