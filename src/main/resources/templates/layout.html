<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — plurb'">plurb</title>
    <link rel="stylesheet" th:href="@{/static/css/main.css}">
</head>

<div th:fragment="scripts">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
</div>

<body>

<nav th:fragment="nav(isPanorama)">
    <div th:class="${isPanorama} ? 'nav-inner' : 'nav-inner nav-inner-wide'">
        <div class="nav-brand-group">
            <a class="nav-brand" th:href="${isPanorama} ? @{/panorama} : @{/}"
               th:text="${isPanorama} ? 'panorama' : 'plurb'">brand</a>
            <span class="nav-tagline"
                  th:text="${isPanorama} ? 'you are what you show.' : 'out of many, one.'"></span>
        </div>
        <div class="nav-links">
            <span sec:authorize="isAuthenticated()">
                <th:block th:if="${isPanorama}">
                    <a class="nav-btn" th:href="@{/panorama/editor}">editor</a>
                    <a class="nav-btn" th:href="@{/panorama/editor/about}">about</a>
                    <a class="nav-btn" th:href="@{/panorama/editor/password}">password</a>
                </th:block>
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <button type="submit" class="nav-btn nav-btn-danger">logout</button>
                </form>
            </span>
            <span sec:authorize="isAnonymous()">
                <a class="nav-btn" th:href="@{/login}">login</a>
            </span>
            <th:block th:if="${isPanorama}">
                <a class="nav-btn" th:href="@{/}">plurb</a>
            </th:block>
            <th:block th:unless="${isPanorama}">
                <a class="nav-btn" th:href="@{/panorama}">panorama</a>
            </th:block>
        </div>
    </div>
</nav>

<footer th:fragment="footer">
    <div class="footer-inner">
        <div class="footer-left">
            <span class="footer-brand">plurb</span>
            <span class="footer-tagline">out of many, one.</span>
        </div>
        <div class="footer-center">
            <p>Made by <a href="https://github.com/chen-benny" target="_blank">Benny Chen</a></p>
            <p>
                Content licensed under
                <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">CC BY 4.0</a>
                · Source code under
                <a href="https://www.gnu.org/licenses/agpl-3.0.html" target="_blank">AGPL-3.0</a>
            </p>
        </div>
        <div class="footer-right">
            <a href="https://github.com/chen-benny/plurb" target="_blank">GitHub</a>
        </div>
    </div>
</footer>

</body>
</html>
