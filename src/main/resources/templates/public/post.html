<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(${post.title})}"></head>
<body>
<nav th:replace="~{layout :: nav(true)}"></nav>

<main class="container">
    <article>
        <header class="post-header">
            <h1 th:text="${post.title}">Post Title</h1>
            <div class="post-meta">
                <a th:href="@{/panorama/{username}(username=${author.username})}"
                   th:text="${author.displayName}">Author</a>
                <span th:text="${#temporals.format(post.publishedAt, 'yyyy-MM-dd')}"></span>
                <span th:each="tag : ${post.tags}">
                    <a class="tag"
                       th:href="@{/panorama/{username}/tag/{slug}(username=${author.username}, slug=${tag.slug})}"
                       th:text="${tag.name}">tag</a>
                </span>
            </div>
        </header>

        <div class="post-body" th:utext="${renderedBody}">
            Post content here.
        </div>
    </article>

    <nav class="post-nav">
        <div class="post-nav-prev">
            <a th:if="${prevPost != null}"
               th:href="@{/panorama/{username}/{slug}(username=${author.username}, slug=${prevPost.slug})}">
                ← <span th:text="${prevPost.title}"></span>
            </a>
        </div>
        <div class="post-nav-center">
            <a th:href="@{/panorama/{username}(username=${author.username})}"
               th:text="${author.displayName}">Author</a>
        </div>
        <div class="post-nav-next">
            <a th:if="${nextPost != null}"
               th:href="@{/panorama/{username}/{slug}(username=${author.username}, slug=${nextPost.slug})}">
                <span th:text="${nextPost.title}"></span> →
            </a>
        </div>
    </nav>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
