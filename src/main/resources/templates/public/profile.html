<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(${author.displayName})}"></head>
<body>
<nav th:replace="~{layout :: nav(true)}"></nav>

<main class="container">
    <section class="profile-header">
        <h1 th:text="${author.displayName}">Display Name</h1>
        <p class="username" th:text="'@' + ${author.username}">@username</p>
        <a class="rss-link" th:href="${rssUrl}">RSS</a>
    </section>

    <div class="profile-tabs">
        <button class="tab-btn" id="btn-about" onclick="showTab('about')">About</button>
        <button class="tab-btn" id="btn-posts" onclick="showTab('posts')">Posts</button>
    </div>

    <div id="tab-about" class="tab-content">
        <div class="post-body" th:if="${not #strings.isEmpty(renderedAbout)}"
             th:utext="${renderedAbout}"></div>
        <p th:if="${#strings.isEmpty(renderedAbout)}">Nothing here yet.</p>
    </div>

    <div id="tab-posts" class="tab-content" style="display:none">
        <section th:if="${not #lists.isEmpty(seriesList)}">
            <h2>Series</h2>
            <ul class="series-list">
                <li th:each="series : ${seriesList}">
                    <a th:href="@{/panorama/{username}/series/{slug}(username=${author.username}, slug=${series.slug})}"
                       th:text="${series.title}">Series Title</a>
                </li>
            </ul>
        </section>

        <section>
            <h2>Posts</h2>
            <ul class="post-list" th:if="${not #lists.isEmpty(posts)}">
                <li th:each="post : ${posts}">
                    <a th:href="@{/panorama/{username}/{slug}(username=${author.username}, slug=${post.slug})}"
                       th:text="${post.title}">Post Title</a>
                    <span class="date"
                          th:text="${#temporals.format(post.publishedAt, 'yyyy-MM-dd')}"></span>
                    <span th:each="tag : ${post.tags}">
                        <a class="tag"
                           th:href="@{/panorama/{username}/tag/{slug}(username=${author.username}, slug=${tag.slug})}"
                           th:text="${tag.name}">tag</a>
                    </span>
                </li>
            </ul>
            <p th:if="${#lists.isEmpty(posts)}">No posts yet.</p>
        </section>
    </div>
</main>

<script>
    function showTab(tab) {
        document.getElementById('tab-about').style.display = tab === 'about' ? 'block' : 'none';
        document.getElementById('tab-posts').style.display = tab === 'posts' ? 'block' : 'none';
        document.getElementById('btn-about').classList.toggle('tab-active', tab === 'about');
        document.getElementById('btn-posts').classList.toggle('tab-active', tab === 'posts');
    }
    document.getElementById('btn-about').classList.add('tab-active');
</script>

<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
