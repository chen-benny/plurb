<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Change Password')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>

<main class="container">
    <div class="login-box">
        <h1>Change Password</h1>
        <div th:if="${error}" class="error" th:text="${error}"></div>
        <div th:if="${success}" class="success" th:text="${success}"></div>
        <form th:action="@{/editor/password}" method="post">
            <div class="form-group">
                <label for="currentPassword">Current Password</label>
                <input type="password" id="currentPassword" name="oldPassword" required>
            </div>
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" name="newPassword" required>
            </div>
            <button type="submit">Change Password</button>
        </form>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
