<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Account')}"></head>
<body>
<nav th:replace="~{layout :: nav(true)}"></nav>

<main class="container">
    <h1>Account</h1>

    <section class="account-section">
        <h2>Username</h2>
        <p class="error" th:if="${usernameError}" th:text="${usernameError}"></p>
        <form th:action="@{/panorama/editor/account/username}" method="post">
            <div class="form-group">
                <label for="newUsername">New Username</label>
                <input type="text" id="newUsername" name="newUsername"
                       th:value="${currentUsername}" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="usernameConfirmPassword">Current Password <span class="hint">(to confirm)</span></label>
                <input type="password" id="usernameConfirmPassword" name="password" required autocomplete="current-password">
            </div>
            <button type="submit">Change Username</button>
        </form>
        <p class="hint" style="margin-top:0.75rem">You will be logged out and must sign in again with the new username.</p>
    </section>

    <section class="account-section">
        <h2>Password</h2>
        <p class="error" th:if="${passwordError}" th:text="${passwordError}"></p>
        <p class="success" th:if="${passwordSuccess}" th:text="${passwordSuccess}"></p>
        <form th:action="@{/panorama/editor/account/password}" method="post">
            <div class="form-group">
                <label for="oldPassword">Current Password</label>
                <input type="password" id="oldPassword" name="oldPassword" required autocomplete="current-password">
            </div>
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" name="newPassword" required autocomplete="new-password">
            </div>
            <button type="submit">Change Password</button>
        </form>
    </section>

    <section class="account-section account-danger">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn-danger">Logout</button>
        </form>
    </section>
</main>

<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
