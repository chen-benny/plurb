<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Edit About')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>

<main class="container">
    <h1>Edit About Page</h1>
    <form th:action="@{/editor/about}" method="post" class="edit-form">
        <div class="form-group">
            <label for="aboutMd">Content <span class="hint">(markdown)</span></label>
            <textarea id="aboutMd" name="aboutMd" rows="20" th:text="${aboutMd}"></textarea>
        </div>
        <div class="form-actions">
            <button type="submit">Save</button>
            <a th:href="@{/editor}">Cancel</a>
        </div>
    </form>
</main>

<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
